<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Full Registration · Keran Li · CAS Framework for Multi-Objective Generative Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/deck.css">
</head>
<body>
  <iframe id="slide-frame"
          title="Current slide"
          allow="fullscreen"></iframe>

  <div id="deck-loading">loading…</div>

  <div id="deck-hud" aria-hidden="false">
    <div id="deck-progress"></div>
    <div id="deck-hint">
      <kbd>←</kbd> <kbd>→</kbd> / <kbd>scroll</kbd> nav · <kbd>O</kbd> overview · <kbd>F</kbd> full-screen
    </div>
    <div id="deck-counter">
      <span class="now">01</span>
      <span class="sep">/</span>
      <span class="total">13</span>
      <span class="sep">·</span>
      <span id="deck-counter-name">Title</span>
    </div>
  </div>

  <div id="deck-overview" aria-hidden="true">
    <div id="deck-overview-grid"></div>
  </div>

  <script src="assets/deck.js"></script>
</body>
</html>
